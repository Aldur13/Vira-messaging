[build]
builder = "nixpacks"
# Nixpacks already runs `npm ci` in its install phase.
# We only need to build the frontend here — DO NOT re-run npm install
# (running it again with NODE_ENV=production skips devDeps and breaks Vite).
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30
